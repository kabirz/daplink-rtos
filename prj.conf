# USB Device Stack
CONFIG_USB_DEVICE_STACK_NEXT=y

# USB HID class for CMSIS-DAP v1
CONFIG_USBD_HID_SUPPORT=y
CONFIG_USBD_HID_IN_BUF_COUNT=4
CONFIG_USBD_HID_OUT_BUF_COUNT=4

# USB CDC ACM for virtual COM port
CONFIG_USBD_CDC_ACM_CLASS=y

# USB MSC for drag-n-drop flashing
CONFIG_USBD_MSC_CLASS=y
CONFIG_USBD_MSC_LUNS_PER_INSTANCE=1
CONFIG_USBD_MSC_SCSI_BUFFER_SIZE=512
CONFIG_USBD_MSC_DOUBLE_BUFFERING=y
CONFIG_USBD_MSC_INSTANCES_COUNT=1

# RAM disk for MSC backend
CONFIG_DISK_DRIVER_RAM=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# UART for target communication
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# GPIO for SWJ debug pins and LEDs
CONFIG_GPIO=y

# Kernel
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# USB identification (via sample_usbd)
CONFIG_SAMPLE_USBD_VID=0x0D28
CONFIG_SAMPLE_USBD_PID=0x0204
CONFIG_SAMPLE_USBD_MANUFACTURER="ARM"
CONFIG_SAMPLE_USBD_PRODUCT="CMSIS-DAP v1/v2"
CONFIG_SAMPLE_USBD_SELF_POWERED=y
CONFIG_SAMPLE_USBD_MAX_POWER=125

# Libraries
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_PRINTK=y
