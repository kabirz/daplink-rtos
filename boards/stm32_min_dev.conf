# Reduced config for STM32F103C8 (64KB flash, 20KB RAM)

# Reduce packet count for smaller queues
CONFIG_DAPLINK_PACKET_COUNT=2

# Reduce heap
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Reduce queue sizes
CONFIG_USBD_HID_IN_BUF_COUNT=1
CONFIG_USBD_HID_OUT_BUF_COUNT=1

# Disable MSC to save RAM (no RAM disk)
CONFIG_USBD_MSC_CLASS=n
CONFIG_DISK_DRIVER_RAM=n

# Disable CMSIS-DAP v2 BULK to save flash
# (CONFIG_USBD_DAP_V2 is not a Kconfig, the class is always compiled)
# Just compile without it - we exclude the file

# Minimize USB logging
CONFIG_USBD_LOG_LEVEL_OFF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_OFF=y
CONFIG_USBD_HID_LOG_LEVEL_OFF=y
