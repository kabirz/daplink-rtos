# stm32_min_dev (STM32F103C8) — 64KB flash, 20KB RAM
# Minimal DAPLink: CMSIS-DAP v1 (HID) + CDC ACM only
# No MSC, no BULK v2, no drag-n-drop flash

CONFIG_LOG=n
CONFIG_DEBUG=n
CONFIG_PRINTK=n
CONFIG_CONSOLE=n

CONFIG_MAIN_STACK_SIZE=1536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

CONFIG_USBD_MSC_CLASS=n
CONFIG_DISK_DRIVER_RAM=n

CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_PWM=n
CONFIG_COUNTER=n
CONFIG_ADC=n
CONFIG_CAN=n
CONFIG_WATCHDOG=n
CONFIG_HWINFO=n

CONFIG_HEAP_MEM_POOL_SIZE=0

CONFIG_USBD_HID_IN_BUF_COUNT=1
CONFIG_USBD_HID_OUT_BUF_COUNT=1
CONFIG_DAPLINK_PACKET_COUNT=2

CONFIG_USBD_LOG_LEVEL_OFF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_OFF=y
CONFIG_USBD_HID_LOG_LEVEL_OFF=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
